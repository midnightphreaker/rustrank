[package]
name = "rustank"
version = "0.1.0"
edition = "2024"

[dependencies]
# MCP server framework
rmcp = { version = "1.7.0", features = ["transport-streamable-http-server", "macros"] }

# Python AST parsing
rustpython-parser = "0.4.0"

# CodeRank / graph algorithms (bidirectional PageRank)
graphops = { version = "0.4", features = ["pagerank"] }

# Embedded ripgrep engine (no subprocess)
grep = "0.3"
regex = "1"

# Git operations
git2 = "0.20"

# tokio async runtime
tokio = { version = "1", features = ["full"] }

# Serde / JSON
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Directory walking
walkdir = "2"

# Ordered collections
indexmap = "2"

# Error handling
thiserror = "2"
anyhow = "1"
